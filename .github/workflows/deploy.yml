name: Deploy

on:
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: financial_agent
          POSTGRES_PASSWORD: test
          POSTGRES_DB: financial_agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt pytest pytest-asyncio pytest-cov

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://financial_agent:test@localhost:5432/financial_agent
          REDIS_URL: redis://localhost:6379/0
        run: python -m pytest tests/ -v --tb=short

      - name: Lint check
        working-directory: backend
        run: |
          pip install ruff
          ruff check . --ignore=E501,F841

      - name: Alembic check
        working-directory: backend
        env:
          DATABASE_URL: postgresql://financial_agent:test@localhost:5432/financial_agent
        run: |
          pip install alembic
          alembic upgrade head 2>&1 || true
          alembic check 2>&1 || true

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/financial-agent
            git pull origin master
            export PG_PASSWORD="${{ secrets.PG_PASSWORD }}"
            export DEEPSEEK_API_KEY="${{ secrets.DEEPSEEK_API_KEY }}"
            export API_KEY="${{ secrets.API_KEY }}"
            docker compose build
            docker compose up -d --force-recreate
            sleep 10
            curl -f http://localhost:8000/api/v1/health || (docker compose down && exit 1)
            unset PG_PASSWORD DEEPSEEK_API_KEY API_KEY
